<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recomendação - BookMatch</title>
    <link rel="stylesheet" href="recomendacao.css">
</head>
<body>

<!-- HEADER -->
<header class="header-banner">
    <h1>BookMatch</h1>
</header>

<!-- CONTAINER -->
<section class="container">

    <!-- LADO ESQUERDO (FORMULÁRIO) -->
    <div class="box">
        <h2>Encontre seu próximo livro</h2>
        <p>Responda algumas perguntas e receba recomendações personalizadas</p>

        <div class="form">

            <label>Qual gênero você prefere?</label>
            <select id="genero">
                <option value="fantasia">Fantasia</option>
                <option value="romance">Romance</option>
                <option value="Classicos">Clássicos</option>
                <option value="aventura">Aventura</option>
                <option value="suspense">Suspense/Thriller</option>
            </select>

            <label>Que tipo de livro você gosta?</label>
            <select id="paginas">
                <option value="curto">Curto (até 300 páginas)</option>
                <option value="medio">Médio (300 a 500 páginas)</option>
                <option value="longo">Longo (+500 páginas)</option>
            </select>

            <label>Com que frequência você lê?</label>
            <select id="frequencia">
                <option value="pouco">Raramente</option>
                <option value="regular">Às vezes</option>
                <option value="muito">Frequentemente</option>
            </select>

            <button onclick="recomendarLivros()">Descobrir livros</button>

        </div>
    </div>

    <!-- LADO DIREITO (RESULTADO) -->
    <div class="resultado-container">
        <h2>Recomendações para você</h2>
        <div id="resultado" class="resultado"></div>
    </div>

</section>

</body>
</html>
