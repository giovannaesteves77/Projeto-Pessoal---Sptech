<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookMatch Dashboard</title>
<link rel="stylesheet" href="/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <div class="logo"><span>BookMatch</span></div>
    <div class="nav">
      <a class="active">Dashboard</a>
      <a class="login" href="paginahome.html">Voltar a página home</a>
    </div>
  </div>

  <div class="main">

    <div class="header">
      <h1>Dashboard</h1>
      <p>Veja os dados gerais das preferências dos usuários.</p>
    </div>

    <div class="top-cards">
      <div class="card"><h3>Total de usuários</h3><h2>128</h2></div>
      <div class="card"><h3>Gênero mais escolhido</h3><h2>Ficção</h2></div>
      <div class="card"><h3>Frequência mais comum</h3><h2>Semanal</h2></div>
      <div class="card"><h3>Páginas preferidas</h3><h2>200–400</h2></div>
    </div>

    <div class="grid">
      <div class="chart-card">
        <h3>Gêneros</h3>
        <canvas id="graficoGenero"></canvas>
      </div>

      <div class="chart-card">
        <h3>Frequência de leitura</h3>
        <canvas id="freq"></canvas>
      </div>

      <div class="chart-card">
        <h3>Páginas</h3>
        <canvas id="paginas"></canvas>
      </div>
    </div>

  </div>
</div>
<script>
fetch("/preferencias/generos")
.then(res => res.json())
.then(dados => {

    const generos = dados.map(i => i.genero);
    const qtd = dados.map(i => i.quantidade);

    new Chart(document.getElementById("graficoGenero"), {
        type: "bar",
        data: {
            labels: generos,
            datasets: [{
                label: "Gêneros mais escolhidos",
                data: qtd
            }]
        }
    });

})
.catch(err => {
    console.log("Erro ao carregar gráfico:", err);
});
</script>
</body>
</html>
